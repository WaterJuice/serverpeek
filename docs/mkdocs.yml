INHERIT: !ENV THEME_STD
site_name: web-proc-info-server

markdown_extensions:
  - pymdownx.snippets:
      base_path:
        - docs/mkdocs
        - .
      check_paths: false
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - attr_list

nav:
  - Home: index.md
  - Usage: usage.md
  - Licence: licence.md
  - Release Notes: release-notes.md
